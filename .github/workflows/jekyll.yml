name: Deploy Jekyll with GitHub Pages dependencies preinstalled
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Backfill git_added from git
        run: |
          for f in _posts/*.md; do
            TS=$(git log --follow --format=%cI -1 "$f" 2>/dev/null || true)
            if [ -n "$TS" ]; then
              # Normalize timezone: +0800 → +08:00
              TS=$(echo "$TS" | sed 's/\([+-][0-9]\{2\}\)\([0-9]\{2\}\)$/\1:\2/')
              # Always overwrite git_added with the actual commit time
              if grep -q "^git_added:" "$f"; then
                sed -i "s/^git_added:.*/git_added: $TS/" "$f"
              else
                sed -i "/^date:/a git_added: $TS" "$f"
              fi
            fi
          done
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
